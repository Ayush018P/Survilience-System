services:
  redis:
    image: redis:7-alpine
    container_name: neuroguard-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: neuroguard-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=neuroguard
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d neuroguard"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: neuroguard-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/neuroguard
      - JWT_SECRET=super_secret_key_change_in_production
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
      - CORS_ORIGINS=http://localhost:3000,http://localhost
    volumes:
      # Mount the data directory to persist SQLite DB, models, and images locally
      - ./backend/data:/app/backend/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neuroguard-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend


