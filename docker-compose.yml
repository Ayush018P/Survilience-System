version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: neuroguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: neuroguard-backend
    ports:
      - "8000:8000"
    volumes:
      # Mount persistent storage volumes
      - ./data:/app/data
      - ./models:/app/models
      - ./snapshots:/app/snapshots
      - ./logs:/app/logs
    environment:
      - REDIS_URL=redis://redis:6379/0
      # API Key will be picked up from the .env file or environment variables on the host
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - redis
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neuroguard-frontend
    ports:
      - "80:80"
      - "3000:80"
    restart: always

volumes:
  redis_data:
